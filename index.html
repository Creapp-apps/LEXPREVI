<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>LexPrevi - Plataforma Previsional</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red; background:white; padding:20px; font-size:20px; z-index:999999; position:absolute; top:0; left:0; right:0;"><h2>Global Error:</h2><pre>' + e.message + '</pre><pre>' + e.filename + ':' + e.lineno + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:red; background:white; padding:20px; font-size:20px; z-index:999999; position:absolute; top:0; left:0; right:0;"><h2>Unhandled Promise Rejection:</h2><pre>' + e.reason + '</pre></div>';
      });
    </script>
  </body>
</html>
